version: '3.8'

services:
  mediassist:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mediassist-app
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MODEL_NAME=gemini-2.5-flash-lite
      - PORT=8000
      - CHROMA_DB_PATH=/app/chroma_db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-secret-key-change-in-production}
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./memory:/app/memory
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
