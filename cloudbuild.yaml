steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/mediassist:$SHORT_SHA', '-t', 'gcr.io/$PROJECT_ID/mediassist:latest', '.']
  
  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mediassist:$SHORT_SHA']
  
  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - --filename=k8s/
      - --image=gcr.io/$PROJECT_ID/mediassist:$SHORT_SHA
      - --location=us-central1
  
  # Alternative: Deploy directly to Cloud Run (simpler)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'mediassist'
      - '--image'
      - 'gcr.io/$PROJECT_ID/mediassist:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY},MODEL_NAME=gemini-2.5-flash-lite'

images:
  - 'gcr.io/$PROJECT_ID/mediassist:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/mediassist:latest'

substitutions:
  _GEMINI_API_KEY: '' # Set this in Cloud Build trigger

options:
  machineType: 'N1_HIGHCPU_8'
  
timeout: '1800s'
