steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/mediassist:$SHORT_SHA', '-t', 'gcr.io/$PROJECT_ID/mediassist:latest', '.']
  
  # Step 2: Push images to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mediassist:$SHORT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mediassist:latest']

  # Step 3: Deploy directly to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'mediassist'
      - '--image'
      - 'gcr.io/$PROJECT_ID/mediassist:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'MODEL_NAME=gemini-2.5-flash-lite,CHROMA_DB_PATH=/app/chroma_db'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '3600'

images:
  - 'gcr.io/$PROJECT_ID/mediassist:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/mediassist:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  
timeout: '1800s'
